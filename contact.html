<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Shera Ritfeld</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F6F1EA; --cream-dark: #EDE5D8; --dark: #1C1B18;
      --accent: #C49A6C; --blush: #EDE0D4; --text: #2E2D2A;
      --text-light: #888480; --border: #E4DAD0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--cream); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.7; }
    a { text-decoration: none; color: inherit; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 28px 60px; border-bottom: 1px solid var(--border); background-color: var(--cream); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--dark); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .contact-section {
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .contact-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-light); margin-bottom: 16px; }
    .contact-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 5vw, 52px); font-weight: 700; color: var(--dark); margin-bottom: 20px; line-height: 1.15; }
    .contact-subtitle { font-size: 16px; color: var(--text-light); margin-bottom: 48px; line-height: 1.8; }

    .contact-form { display: flex; flex-direction: column; gap: 24px; }

    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }

    .form-input, .form-textarea {
      background-color: transparent;
      border: 1px solid var(--border);
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 160px; }

    .btn-primary {
      display: inline-block;
      background-color: var(--dark);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 16px 32px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .btn-primary:hover { background-color: #333; }

    .contact-email {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }
    .contact-email p { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
    .contact-email a { color: var(--dark); font-weight: 500; border-bottom: 1px solid var(--border); transition: border-color 0.2s; }
    .contact-email a:hover { border-color: var(--accent); }

    footer { border-top: 1px solid var(--border); padding: 32px 60px; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--dark); }
    .footer-copy { font-size: 12px; color: var(--text-light); }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      footer { padding: 24px; flex-direction: column; gap: 12px; }
    }
  </style>

<body>

  <nav>
    <div class="nav-logo">Shera Ritfeld</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="posts.html">Stories</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <section class="contact-section">
    <p class="contact-tag">Get in touch</p>
    <h1 class="contact-title">Let's connect.</h1>
    <!-- ✏️ CHANGE YOUR EMAIL BELOW -->
    <p class="contact-subtitle">
      For collaborations, questions, or just to say hi — I'd love to hear from you.
    </p>

    <form class="contact-form" name="contact" method="POST" data-netlify="true" action="/thank-you.html">
      <input type="hidden" name="form-name" value="contact" />
      <div class="form-group">
        <label class="form-label" for="name">Your Name</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="Jane Doe" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Your Email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="jane@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="subject">Subject</label>
        <input class="form-input" type="text" id="subject" name="subject" placeholder="Collaboration / Question / Just saying hi" />
      </div>
      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" placeholder="Tell me what's on your mind..." required></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <div class="contact-email">
      <p>Or reach me directly at:</p>
      <a href="mailto:info@sheraritfeld.com">info@sheraritfeld.com</a>
    </div>
  </section>

  <footer>
    <div class="footer-logo">Shera Ritfeld</div>
    <p class="footer-copy">© 2026 Shera Ritfeld. Made with intention.</p>
  </footer>

</body>
</html>
